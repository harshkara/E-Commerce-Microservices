name: Gateway Service CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'gateway-service/**'
      - 'common-lib/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify Maven Version
        run: mvn -version

      - name: Build Project
        run: mvn clean package -pl gateway-service -am