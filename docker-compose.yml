version: '3.9'

services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      - redis
      - gateway-service

  task-service:
    build:
      context: ./task-service
    container_name: task-service
    ports:
      - "8082:8082"
    depends_on:
      - redis
      - gateway-service

  gateway-service:
    build:
      context: ./gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - redis
