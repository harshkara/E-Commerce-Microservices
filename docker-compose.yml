services:
  redis:
    image: harshkara/redis:7
    container_name: redis
    ports:
      - "6379:6379"

  auth-service:
    image: harshkara/auth-service:latest
    build:
      context: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
#    depends_on:
#      - redis
#      - gateway-service

  product-service:
    image: harshkara/product-service:latest
    build:
      context: ./product-service
    container_name: product-service
    ports:
      - "8082:8082"
#    depends_on:
#      - redis
#      - gateway-service

  order-service:
    image: harshkara/order-service:latest
    build:
      context: ./order-service
    container_name: order-service
    ports:
      - "8083:8083"
#    depends_on:
#      - redis
#      - gateway-service

  gateway-service:
    image: harshkara/gateway-service:latest
    build:
      context: ./gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080"
#    depends_on:
#      - redis
