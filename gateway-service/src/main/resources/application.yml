server:
  port: 8080

spring:
  application:
    name: gateway-service

  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/api/product/**

        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/order/**

logging:
  level:
    root: INFO
    com.ecommerce.authService: INFO
    org.springframework.web: INFO
    org.hibernate.sql: WARN
    org.hibernate.orm.jdbc.bind: WARN

jwt:
  secret: VGhpc0lzQVNlY3JldEtleUZvckpXVEhTMjU2QWxnb3JpdGhtMTIzNDU2