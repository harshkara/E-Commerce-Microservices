server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/task/**

logging:
  level:
    root: INFO
    com.ecommerce.authService : INFO
    org.springframework.web : INFO
    org.hibernate.sql : WARN
    org.hibernate.orm.jdbc.bind : WARN

jwt:
  secret: VGhpc0lzQVNlY3JldEtleUZvckpXVEhTMjU2QWxnb3JpdGhtMTIzNDU2
